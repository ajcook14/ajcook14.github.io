<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Andrew Cook Mathematics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/cosmo/bootstrap.min.css" rel="stylesheet">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/10.0.3/styles/default.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/10.0.3/highlight.min.js"></script>
    <script>hljs.initHighlightingOnLoad();</script>
</head>
<body>
    <header class="bg-primary text-white text-center py-5">
        <h1 class="display-4">Wind angle calculator</h1>
    </header>

<div class="container mt-4">
    <form id="myForm">
        <div class="mb-3">
            <label for="stbdHdg" class="form-label">Stbd tack heading (magnetic)</label>
            <input type="number" class="form-control" id="stbdHdg" placeholder="(in degrees)">
            <div class="invalid-feedback">Please enter an angle between 0 and 360.</div>
        </div>
        <div class="mb-3">
            <label for="portHdg" class="form-label">Port tack heading (magnetic)</label>
            <input type="number" class="form-control" id="portHdg" placeholder="(in degrees)">
            <div class="invalid-feedback">Please enter an angle between 0 and 360.</div>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    <div id="result" class="mt-3"></div>

    <hr>

    <form id="courseForm">
        <div class="mb-3">
            <label for="courseInput" class="form-label">Course name</label>
            <input type="text" class="form-control" id="courseInput" placeholder="e.g. 32s">
            <div class="invalid-feedback">Course not found.</div>
        </div>
        <button type="submit" class="btn btn-primary">Look up course</button>
    </form>
    <div id="courseResult" class="mt-3"></div>
</div>

<script>
    // --- Shared state ---
    let trueWindAngle = null;

    // --- Wind angle calculator ---
    function averageAngle(a, b) {
        if (b < a) b += 360;
        return ((a + b) / 2) % 360;
    }

    function validateAngle(input) {
        const val = parseInt(input.value);
        const valid = !isNaN(val) && val >= 0 && val <= 360;
        input.classList.toggle('is-invalid', !valid);
        input.classList.toggle('is-valid', valid);
        return valid;
    }

    document.getElementById('myForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const stbdHdgInput = document.getElementById('stbdHdg');
        const portHdgInput = document.getElementById('portHdg');

        const validStbd = validateAngle(stbdHdgInput);
        const validPort = validateAngle(portHdgInput);

        if (validStbd && validPort) {
            const stbdHdg = parseInt(stbdHdgInput.value);
            const portHdg = parseInt(portHdgInput.value);
            trueWindAngle = Math.round((averageAngle(stbdHdg, portHdg) - 11.97 + 360) % 360 * 10) / 10;
            document.getElementById('result').innerHTML =
                `<div class="alert alert-success">True wind: ${trueWindAngle} deg</div>`;
        }
    });

    // --- Course lookup ---
    async function loadCSV(filename) {
        const response = await fetch(filename);
        const text = await response.text();
        return text.trim().split('\n').map(line => line.split(','));
    }

    function toRadians(deg) { return deg * Math.PI / 180; }
    function toDegrees(rad) { return rad * 180 / Math.PI; }

    function trueBearing(lat1, lon1, lat2, lon2) {
        const φ1 = toRadians(lat1), φ2 = toRadians(lat2);
        const Δλ = toRadians(lon2 - lon1);
        const x = Math.sin(Δλ) * Math.cos(φ2);
        const y = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
        return (toDegrees(Math.atan2(x, y)) + 360) % 360;
    }

    function tackAngle(bearing, windAngle) {
        const diff = Math.abs(bearing - windAngle) % 360;
        return Math.round(Math.min(diff, 360 - diff) * 10) / 10;
    }

    async function lookupCourse(courseName) {
        const [courses, marksCSV] = await Promise.all([
            loadCSV('rmys_courses.csv'),
            loadCSV('marks.csv')
        ]);

        // Build a map of mark name -> {desc, lat, lon}
        const markMap = {};
        for (const row of marksCSV) {
            const name = row[0].replace(/"/g, '').trim();
            const desc = row[1].replace(/"/g, '').trim();
            const lat = -(parseFloat(row[2]) + parseFloat(row[3]) / 60);
            const lon =   parseFloat(row[4]) + parseFloat(row[5]) / 60;
            markMap[name] = { desc, lat, lon };
        }

        // Find the matching course row
        const course = courses.find(row => row[0].trim() === courseName.trim());
        if (!course) return null;

        // Collect non-empty mark names (columns 1 onwards)
        const markNames = course.slice(1).filter(m => m.trim() !== '');

        // Compute bearings between consecutive marks
        const legs = [];
        for (let i = 0; i < markNames.length - 1; i++) {
            const from = markMap[markNames[i]];
            const to   = markMap[markNames[i + 1]];
            if (!from || !to) {
                legs.push({ from: markNames[i], to: markNames[i + 1], bearing: null, tack: null });
            } else {
                const bearing = Math.round(trueBearing(from.lat, from.lon, to.lat, to.lon) * 10) / 10;
                const tack = trueWindAngle !== null ? tackAngle(bearing, trueWindAngle) : null;
                legs.push({ from: markNames[i], to: markNames[i + 1], bearing, tack });
            }
        }

        return { markNames, legs };
    }

    document.getElementById('courseForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const courseInput = document.getElementById('courseInput');
        const courseName = courseInput.value.trim();
        const courseResult = document.getElementById('courseResult');

        const result = await lookupCourse(courseName);

        if (!result) {
            courseInput.classList.add('is-invalid');
            courseInput.classList.remove('is-valid');
            courseResult.innerHTML = '';
        } else {
            courseInput.classList.remove('is-invalid');
            courseInput.classList.add('is-valid');
            const { markNames, legs } = result;
            const markList = markNames.map(m => `<li class="list-group-item">${m}</li>`).join('');
            const legList = legs.map(l =>
                `<li class="list-group-item d-flex justify-content-between">
                    <span>${l.from} → ${l.to}</span>
                    <span>${l.bearing !== null ? l.bearing + '° true' : 'unknown mark'}</span>
                    <span>${l.tack !== null ? l.tack + '° off wind' : trueWindAngle === null ? 'no wind angle set' : ''}</span>
                </li>`
            ).join('');
            courseResult.innerHTML = `
                <p class="fw-bold">Marks for course ${courseName}:</p>
                <ul class="list-group mb-3">${markList}</ul>
                <p class="fw-bold">Leg bearings (true):</p>
                <ul class="list-group">${legList}</ul>`;
        }
    });
</script>
    
    <div class="container mt-4">
        <a href="index.html" class="btn btn-secondary">← Back to Home</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
